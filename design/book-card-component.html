<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Book Card — Component Review</title>

  <link rel="stylesheet" href="system/tenants/augsburg.css">
  <link rel="stylesheet" href="system/tokens.css">
  <link rel="stylesheet" href="system/components.css">

  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>

  <style>
    body { background: #f2f2f7; }
    .page { max-width: 960px; margin: 0 auto; padding: 64px 32px 120px; }

    .label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #aeaeb2;
      margin-bottom: 24px;
    }

    .row {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
      align-items: flex-start;
    }

    [data-lucide] { display: block; }


    /* ════════════════════════════════════════
       BOOK CARD — Component
    ════════════════════════════════════════ */

    .pa {
      width: 148px;
      cursor: pointer;
    }

    /* Availability row — above cover, right-aligned */
    .pa__availability {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 5px;
      margin-bottom: 8px;
      font-size: 11px;
      font-weight: 500;
    }

    .pa__dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .pa__dot--available { background: #34c759; }
    .pa__dot--borrowed  { background: #ff3b30; }
    .pa__dot--reserved  { background: #ff9500; }

    .pa__status--available { color: #34c759; }
    .pa__status--borrowed  { color: #ff3b30; }
    .pa__status--reserved  { color: #ff9500; }

    /* Cover */
    .pa__cover {
      width: 148px;
      aspect-ratio: 2/3;
      border-radius: 13px;
      overflow: hidden;
      margin-bottom: 11px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.16), 0 1px 4px rgba(0,0,0,0.09);
      transition: transform 0.28s cubic-bezier(0.16,1,0.3,1),
                  box-shadow 0.28s ease;
    }
    .pa:hover .pa__cover {
      transform: translateY(-4px);
      box-shadow: 0 12px 36px rgba(0,0,0,0.18), 0 2px 8px rgba(0,0,0,0.10);
    }
    .pa__cover img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    /* Title & Author */
    .pa__title {
      font-size: 13px;
      font-weight: 600;
      color: #1c1c1e;
      line-height: 1.3;
      margin-bottom: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .pa__author {
      font-size: 12px;
      color: #8e8e93;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 7px;
    }

    /* Meta row — below author, left-aligned: mediatype | divider | category */
    .pa__meta {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      font-weight: 400;
      color: #aeaeb2;
    }
    .pa__type {
      display: flex;
      align-items: center;
      gap: 3px;
    }
    .pa__type [data-lucide] { width: 11px; height: 11px; stroke-width: 1.8; }
    .pa__divider {
      width: 1px;
      height: 10px;
      background: #d1d1d6;
    }
  </style>
</head>
<body>
<div class="page">
  <div class="label">Book Card — Component Review</div>

  <div class="row">

    <!-- Available -->
    <div class="pa">
      <div class="pa__availability">
        <div class="pa__dot pa__dot--available"></div>
        <span class="pa__status--available">Verfügbar</span>
      </div>
      <div class="pa__cover">
        <img src="https://covers.openlibrary.org/b/isbn/9780143127741-L.jpg" alt="">
      </div>
      <div class="pa__title">Thinking, Fast and Slow</div>
      <div class="pa__author">Daniel Kahneman</div>
      <div class="pa__meta">
        <div class="pa__type"><i data-lucide="book"></i> Buch</div>
        <div class="pa__divider"></div>
        Sachbuch
      </div>
    </div>

    <!-- Borrowed with return date -->
    <div class="pa">
      <div class="pa__availability">
        <div class="pa__dot pa__dot--borrowed"></div>
        <span class="pa__status--borrowed">Zurück am 31.03.</span>
      </div>
      <div class="pa__cover">
        <img src="https://covers.openlibrary.org/b/isbn/9780062316097-L.jpg" alt="">
      </div>
      <div class="pa__title">The Innovators</div>
      <div class="pa__author">Walter Isaacson</div>
      <div class="pa__meta">
        <div class="pa__type"><i data-lucide="tablet"></i> E-Book</div>
        <div class="pa__divider"></div>
        Fantasy
      </div>
    </div>

    <!-- Reserved -->
    <div class="pa">
      <div class="pa__availability">
        <div class="pa__dot pa__dot--reserved"></div>
        <span class="pa__status--reserved">Vorgemerkt</span>
      </div>
      <div class="pa__cover">
        <img src="https://covers.openlibrary.org/b/isbn/9780374533557-L.jpg" alt="">
      </div>
      <div class="pa__title">A Room of One's Own</div>
      <div class="pa__author">Virginia Woolf</div>
      <div class="pa__meta">
        <div class="pa__type"><i data-lucide="headphones"></i> Hörbuch</div>
        <div class="pa__divider"></div>
        Literatur
      </div>
    </div>

    <!-- Available -->
    <div class="pa">
      <div class="pa__availability">
        <div class="pa__dot pa__dot--available"></div>
        <span class="pa__status--available">Verfügbar</span>
      </div>
      <div class="pa__cover">
        <img src="https://covers.openlibrary.org/b/isbn/9780062316110-L.jpg" alt="">
      </div>
      <div class="pa__title">Sapiens</div>
      <div class="pa__author">Yuval Noah Harari</div>
      <div class="pa__meta">
        <div class="pa__type"><i data-lucide="book"></i> Buch</div>
        <div class="pa__divider"></div>
        Romantik
      </div>
    </div>

  </div>
</div>
<script>lucide.createIcons();</script>
</body>
</html>
