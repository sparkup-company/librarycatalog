<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Koha Biblios</title>
  <style>
    body { font-family: sans-serif; max-width: 800px; margin: 40px auto; padding: 0 20px; }
    input { padding: 6px 10px; width: 300px; font-size: 14px; }
    button { padding: 6px 14px; font-size: 14px; cursor: pointer; }
    table { width: 100%; border-collapse: collapse; margin-top: 20px; }
    th, td { text-align: left; padding: 8px 10px; border-bottom: 1px solid #ddd; }
    th { background: #f4f4f4; }
    #status { margin-top: 10px; color: #888; font-size: 13px; }
  </style>
</head>
<body>
  <h2>Koha Biblios</h2>
  <input type="text" id="search" placeholder="Search by title (leave empty for all)">
  <button onclick="load()">Search</button>
  <div id="status"></div>
  <table id="results" style="display:none">
    <thead><tr><th>ID</th><th>Title</th><th>Author</th><th>Year</th></tr></thead>
    <tbody></tbody>
  </table>

  <script>
    const BASE_URL = "/api/v1";

    async function load() {
      const search = document.getElementById("search").value.trim();
      const status = document.getElementById("status");
      const table = document.getElementById("results");
      const tbody = table.querySelector("tbody");

      status.textContent = "Loading...";
      tbody.innerHTML = "";
      table.style.display = "none";

      let url = `${BASE_URL}/biblios?_per_page=50`;
      if (search) {
        const q = JSON.stringify({ title: { "-like": `%${search}%` } });
        url += `&q=${encodeURIComponent(q)}`;
      }

      try {
        const res = await fetch(url);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const biblios = await res.json();

        status.textContent = `${biblios.length} result(s)${search ? ` for "${search}"` : ""}`;
        for (const b of biblios) {
          const tr = document.createElement("tr");
          tr.innerHTML = `<td>${b.biblio_id}</td><td>${b.title ?? ""}</td><td>${b.author ?? ""}</td><td>${b.copyright_date ?? ""}</td>`;
          tbody.appendChild(tr);
        }
        table.style.display = biblios.length ? "table" : "none";
      } catch (e) {
        status.textContent = `Error: ${e.message}`;
      }
    }

    // load on Enter key
    document.getElementById("search").addEventListener("keydown", e => {
      if (e.key === "Enter") load();
    });

    // load on startup
    load();
  </script>
</body>
</html>
